<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#8ab4f8">
  <title>🎯 오늘의 주제 by arrange</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root {
  --blue:#8ab4f8; --red:#f28b82; --purple:#c58af9; --green:#81c995;
  --text:#202124; --text2:#5f6368; --border:#dadce0; --surface:#fff; --bg:#fff;
  --hover:#f1f3f4; --divider:#e8eaed; --chip:#e8f0fe;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Google Sans','Roboto','Noto Sans KR',-apple-system,sans-serif;
  line-height:1.5; color:var(--text); background:var(--bg);
  max-width:1280px; margin:0 auto; padding:20px 20px 48px;
  -webkit-font-smoothing:antialiased;
}
header { padding:12px 0 16px; border-bottom:1px solid var(--divider); margin-bottom:20px; }
header h1 { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
header .sub { color:var(--text2); font-size:13px; margin-top:6px; }
a { color:var(--blue); text-decoration:none; }
a:hover { text-decoration:underline; }

/* 요약 카드 */
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
.card .label { font-size:13px; color:var(--text2); margin-bottom:8px; font-weight:500; }
.card .value { font-size:30px; font-weight:500; letter-spacing:-0.5px; }
.card.tone-red { background:rgba(242,139,130,.08); border-color:rgba(242,139,130,.35); }
.card.tone-red .value { color:var(--red); }
.card.tone-green { background:rgba(129,201,149,.08); border-color:rgba(129,201,149,.35); }
.card.tone-green .value { color:var(--green); }
.card.tone-blue { background:rgba(138,180,248,.08); border-color:rgba(138,180,248,.35); }
.card.tone-blue .value { color:var(--blue); }
.card.tone-purple { background:rgba(197,138,249,.08); border-color:rgba(197,138,249,.35); }
.card.tone-purple .value { color:#a855f7; }

/* 카테고리 탭 */
.tabs { display:flex; flex-wrap:wrap; gap:6px; margin:16px 0 12px; }
.tab { padding:8px 16px; border-radius:20px; background:var(--hover); color:var(--text2);
       font-size:14px; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
.tab:hover { background:#e3e6e8; }
.tab.active { background:var(--blue); color:#fff; }
.tab .cnt { font-size:12px; opacity:.8; margin-left:4px; }

/* 필터 바 */
.filters { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:16px;
           padding:12px 16px; background:var(--hover); border-radius:8px; }
.filter-group { display:flex; gap:4px; align-items:center; }
.filter-group .lbl { font-size:12px; color:var(--text2); margin-right:4px; }
.seg { display:flex; border:1px solid var(--border); border-radius:16px; overflow:hidden; background:#fff; }
.seg button { padding:6px 12px; border:none; background:#fff; font-size:13px; cursor:pointer; color:var(--text2); }
.seg button.active { background:var(--blue); color:#fff; }
.toggle { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text); cursor:pointer; }
#search { flex:1; min-width:160px; padding:8px 14px; border:1px solid var(--border);
          border-radius:20px; font-size:14px; background:#fff; }
#search:focus { outline:none; border-color:var(--blue); }

/* 채널 카드 그리드 */
.ch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }
.ch-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
           padding:16px; transition:box-shadow .2s; }
.ch-card:hover { box-shadow:0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15); }
.ch-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.ch-name { font-size:16px; font-weight:700; }
.ch-meta { font-size:12px; color:var(--text2); margin-top:2px; }
.ch-type { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--hover); color:var(--text2); white-space:nowrap; }
.ch-cats { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; }
.ch-cat { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--chip); color:var(--blue); font-weight:500; }
.ch-stats { display:flex; gap:12px; margin:10px 0; padding:8px 0; border-top:1px solid var(--divider); border-bottom:1px solid var(--divider); }
.ch-stat { font-size:12px; color:var(--text2); }
.ch-stat b { font-size:15px; color:var(--text); font-weight:600; display:block; }
.ch-stat.sig b { color:var(--red); }
.ch-vid { margin-top:8px; }
.ch-vid .vlabel { font-size:11px; color:var(--text2); font-weight:500; }
.ch-vid .vtitle { font-size:13px; display:block; margin-top:2px; }
.ch-vid .vmeta { font-size:11px; color:var(--text2); }
.empty { text-align:center; color:var(--text2); padding:40px; grid-column:1/-1; }

section { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:16px; }
section h2 { font-size:18px; font-weight:500; margin-bottom:16px; }
.archive-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
.archive-grid a { display:block; background:var(--surface); border:1px solid var(--border); padding:12px;
                  border-radius:8px; text-align:center; font-size:13px; color:var(--text); font-weight:500; }
.archive-grid a:hover { background:var(--hover); border-color:var(--blue); text-decoration:none; }
.archive-grid a.today { background:var(--blue); border-color:var(--blue); color:#fff; }
.nav-links { margin:12px 0; display:flex; gap:8px; flex-wrap:wrap; }
.nav-links a { background:var(--chip); padding:8px 16px; border-radius:20px; font-size:14px; font-weight:500; }
/* 국가 전환 버튼 (한국 ⇄ 일본) — 최상단 prominent */
.country-switch { display:inline-flex; align-items:center; gap:7px; padding:8px 16px; border:1px solid var(--border);
  border-radius:20px; font-size:14px; font-weight:600; color:var(--text); background:var(--surface); margin-bottom:12px; }
.country-switch:hover { background:var(--hover); border-color:var(--blue); text-decoration:none; }
/* 설명·지표 범례 바 */
.info-bar { background:var(--hover); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin:6px 0 18px; font-size:13px; color:var(--text2); line-height:1.9; }
.info-bar .desc { display:block; margin-bottom:6px; color:var(--text); font-weight:500; font-size:14px; }
.info-bar b { color:var(--text); }
.legend-item { display:inline-block; margin-right:16px; white-space:nowrap; }
/* nav 강조 (오늘 만들 주제) */
.nav-links a.nav-primary { background:var(--blue); color:#fff; }
/* 제작 추천 보드 */
.rec-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:8px; }
.rec-group h3 { font-size:15px; font-weight:700; margin:6px 0 10px; }
.rec-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
.rec-card:hover { box-shadow:0 1px 2px rgba(60,64,67,.2),0 2px 6px 2px rgba(60,64,67,.12); }
.rec-rank { color:var(--text2); font-weight:500; font-size:12px; margin-right:6px; }
.rec-topic { font-size:15px; font-weight:700; margin-bottom:5px; }
.rec-date { font-size:11px; color:#1e8e3e; font-weight:500; margin-bottom:4px; }
.rec-why { font-size:12px; color:var(--text2); margin-bottom:7px; }
.rec-ref { font-size:12px; display:inline-block; }
.rec-empty { color:var(--text2); padding:18px; font-size:13px; }
/* 🔥 재편집 재폭발 (최우선) */
.reedit-box { background:rgba(242,139,130,.08); border:1px solid rgba(242,139,130,.45); border-radius:12px; padding:14px 16px; margin:10px 0 20px; }
.reedit-head { font-size:16px; font-weight:700; }
.reedit-sub { display:block; font-size:12px; font-weight:400; color:var(--text2); margin-top:3px; }
.reedit-card { padding:10px 0; border-top:1px solid rgba(242,139,130,.22); }
.reedit-card:first-of-type { border-top:none; }
.reedit-line1 { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.reedit-line1 .row-title { max-width:420px; font-weight:500; }
.reedit-meta { font-size:12px; color:var(--text2); margin-top:4px; padding-left:26px; }
@media (max-width:600px){ .rec-cols{ grid-template-columns:1fr; } .reedit-line1 .row-title{ max-width:200px; } }
footer { text-align:center; color:var(--text2); font-size:12px; padding:24px 0 8px; }

/* 테이블 (아카이브 + 리포트 공통) — 클린 랭킹 행 */
.tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:auto; margin:10px 0 18px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
thead th { text-align:left; font-weight:500; font-size:12px; color:var(--text2);
  padding:11px 14px; border-bottom:1px solid var(--border); white-space:nowrap; background:#fafbfc; }
tbody td { padding:11px 14px; border-bottom:1px solid var(--divider); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:var(--hover); }
td.rank, th.rank { width:34px; text-align:center; color:var(--text2); font-weight:500; font-variant-numeric:tabular-nums; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
td.num.lead { color:var(--text); font-weight:600; }
.muted { color:var(--text2); }
.cat-badge { display:inline-block; font-size:11px; padding:2px 9px; border-radius:11px; font-weight:500; white-space:nowrap; }
.kw { font-weight:700; font-size:15px; }
.cellv { display:flex; flex-direction:column; gap:1px; }
.row-title { display:inline-block; max-width:520px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; vertical-align:bottom; }
.row-sub { font-size:11px; color:var(--text2); }
.ch-tag { font-size:11px; padding:1px 7px; border-radius:9px; background:var(--hover); color:var(--text2); }
/* 리포트 섹션 헤더 */
.rep-sec { margin:24px 0 4px; display:flex; align-items:baseline; gap:8px; }
.rep-sec h2 { font-size:17px; font-weight:700; }
.rep-sec .cnt { font-size:13px; color:var(--text2); }
.rep-note { font-size:12px; color:var(--text2); margin:0 0 6px; }
/* 마크다운 리포트 잔여 표 */
section table { margin:10px 0; }

/* 뉴스 헤드라인 리스트 (Pixeling 스타일) */
.news-list { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.news-row { display:flex; gap:12px; align-items:baseline; padding:13px 16px; border-bottom:1px solid var(--divider); }
.news-row:last-child { border-bottom:none; }
.news-row:hover { background:var(--hover); }
.news-rank { width:22px; flex-shrink:0; color:var(--text2); font-size:13px; font-weight:500; text-align:right; font-variant-numeric:tabular-nums; }
.news-body { display:flex; flex-direction:column; gap:3px; min-width:0; }
.news-title { font-size:14px; font-weight:500; color:var(--text); white-space:normal; }
.news-title:hover { color:var(--blue); }
.news-meta { font-size:12px; color:var(--text2); display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
.news-src { color:#1e8e3e; font-weight:500; }
.news-cat { font-size:11px; padding:1px 7px; border-radius:9px; background:var(--chip); color:var(--blue); font-weight:500; }
.news-orig { font-size:12px; color:var(--text2); }

@media (max-width:600px) {
  body { padding:14px; }
  header h1 { font-size:21px; }
  .cards { grid-template-columns:repeat(2,1fr); gap:8px; }
  .card .value { font-size:24px; }
  .ch-grid { grid-template-columns:1fr; }
  .filters { flex-direction:column; align-items:stretch; }
  .row-title { max-width:200px; }
  tbody td, thead th { padding:9px 8px; }
}
</style>
</head>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#a855f7">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <title>🔄 분석 업데이트</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap');
:root {
  /* 다크 베이스 */
  --bg:#0a0a12; --surface:#13131c; --surface2:#1a1a26;
  --border:#26263a; --divider:#1f1f30; --hover:#1e1e2e;
  /* 텍스트 */
  --text:#ededf2; --text2:#9696a6; --text3:#6c6c80;
  /* 키 컬러 — 보라 (알고리즘 해킹) */
  --primary:#a855f7; --primary-hi:#c084fc; --primary-bg:rgba(168,85,247,.12); --primary-bd:rgba(168,85,247,.35);
  /* 보조 강조 */
  --hot:#84cc16;        /* 라임 — 폭발/검증 */
  --hot-bg:rgba(132,204,22,.10); --hot-bd:rgba(132,204,22,.35);
  --warn:#ff7a45;       /* 오렌지 — 시그널 */
  --warn-bg:rgba(255,122,69,.10); --warn-bd:rgba(255,122,69,.35);
  --danger:#ef4444;     /* 빨강 — 폭락 */
  --danger-bg:rgba(239,68,68,.10); --danger-bd:rgba(239,68,68,.35);
  --up:#4ade80; --down:#ef4444;  /* 등락 */
  --info:#60a5fa; --info-bg:rgba(96,165,250,.10);
  /* 호환 (구 변수명) */
  --blue:var(--primary); --green:var(--up); --red:var(--danger); --purple:var(--primary-hi);
  --chip:rgba(168,85,247,.13);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Inter','Noto Sans KR',-apple-system,sans-serif;
  line-height:1.5; color:var(--text); background:var(--bg);
  max-width:1320px; margin:0 auto; padding:18px 20px 48px;
  -webkit-font-smoothing:antialiased; font-feature-settings:'cv11','ss01';
}
header { padding:14px 0 16px; border-bottom:1px solid var(--divider); margin-bottom:20px;
         display:flex; flex-wrap:wrap; align-items:center; gap:14px; }
header .brand-block { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
header h1 { font-size:13px; font-weight:400; color:var(--text2); line-height:1.3; letter-spacing:0; display:flex; align-items:baseline; gap:8px; }
header h1 .brand-flag { font-size:18px; line-height:1; }
header h1 .brand-accent { color:var(--primary); font-weight:800; font-size:22px; letter-spacing:-0.5px; transition:color .15s; }
header .brand-link:hover h1 .brand-accent { color:var(--primary-hi); }
header .brand-link:hover h1 .brand-slogan { color:var(--text); }
header h1 .brand-divider { color:var(--text3); margin:0 2px; }
header h1 .brand-slogan { font-size:13px; color:var(--text2); font-weight:400; }
header .sub { color:var(--text3); font-size:12px; margin-top:4px; flex-basis:100%; }
header .header-chips { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; align-items:center; }
.h-chip { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:13px;
          background:var(--surface); border:1px solid var(--border); font-size:12px; color:var(--text2); font-weight:500; }
.h-chip b { color:var(--text); font-weight:700; font-variant-numeric:tabular-nums; }
.h-chip.warn { border-color:var(--warn-bd); background:var(--warn-bg); color:var(--warn); }
.h-chip.warn b { color:var(--warn); }
.h-chip.hot { border-color:var(--hot-bd); background:var(--hot-bg); color:var(--hot); }
.h-chip.hot b { color:var(--hot); }
.h-chip.info { border-color:var(--primary-bd); background:var(--primary-bg); color:var(--primary-hi); }
.h-chip.info b { color:var(--primary-hi); }
.h-chip.jp { background:#fff; border-color:#fff; color:#0a0a12; font-weight:700; cursor:pointer; transition:all .15s; }
.h-chip.jp:hover { background:#e8e8f0; border-color:#e8e8f0; color:#000; text-decoration:none; }
.h-chip.secondary { background:transparent; border-color:var(--border); color:var(--text2); font-weight:600; cursor:pointer; transition:all .15s; text-decoration:none; }
.h-chip.secondary:hover { background:var(--surface); border-color:var(--primary-bd); color:var(--text); text-decoration:none; }
a { color:var(--primary-hi); text-decoration:none; transition:color .15s; }
a:hover { color:var(--primary); text-decoration:none; }

/* 요약 카드 */
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:22px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px; transition:transform .15s, border-color .15s; }
.card:hover { transform:translateY(-1px); border-color:var(--primary-bd); }
.card .label { font-size:12px; color:var(--text2); margin-bottom:8px; font-weight:600; display:flex; align-items:center; gap:5px; text-transform:none; letter-spacing:0; }
.card .value { font-size:30px; font-weight:800; letter-spacing:-0.6px; line-height:1.05; font-variant-numeric:tabular-nums; }
.card.tone-red { background:var(--danger-bg); border-color:var(--danger-bd); }
.card.tone-red .value { color:var(--danger); }
.card.tone-green { background:var(--hot-bg); border-color:var(--hot-bd); }
.card.tone-green .value { color:var(--hot); }
.card.tone-blue { background:var(--primary-bg); border-color:var(--primary-bd); }
.card.tone-blue .value { color:var(--primary-hi); }
.card.tone-purple { background:rgba(168,85,247,.18); border-color:rgba(168,85,247,.4); }
.card.tone-purple .value { color:var(--primary-hi); }
.card.tone-warn { background:var(--warn-bg); border-color:var(--warn-bd); }
.card.tone-warn .value { color:var(--warn); }

/* 카테고리 탭 */
.tabs { display:flex; flex-wrap:wrap; gap:6px; margin:18px 0 14px; }
.tab { padding:6px 13px; border-radius:16px; background:var(--surface); color:var(--text2);
       font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); transition:all .15s; }
.tab:hover { border-color:var(--primary-bd); color:var(--text); }
.tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.tab .cnt { font-size:11px; opacity:.85; margin-left:5px; padding:1px 6px; background:rgba(255,255,255,.15); border-radius:8px; }

/* 필터 바 */
.filters { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:18px;
           padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }
.filter-group { display:flex; gap:5px; align-items:center; }
.filter-group .lbl { font-size:11px; color:var(--text2); margin-right:5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.seg { display:flex; border:1px solid var(--border); border-radius:14px; overflow:hidden; background:var(--bg); }
.seg button { padding:6px 12px; border:none; background:transparent; font-size:13px; cursor:pointer; color:var(--text2); font-weight:500; transition:all .15s; }
.seg button:hover { color:var(--text); background:var(--hover); }
.seg button.active { background:var(--primary); color:#fff; }
.toggle { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text); cursor:pointer; }
.toggle input[type=checkbox] { appearance:none; width:32px; height:18px; background:var(--border); border-radius:9px; position:relative; cursor:pointer; transition:background .2s; }
.toggle input[type=checkbox]::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform .2s; }
.toggle input[type=checkbox]:checked { background:var(--primary); }
.toggle input[type=checkbox]:checked::after { transform:translateX(14px); }
#search { flex:1; min-width:160px; padding:8px 14px; border:1px solid var(--border);
          border-radius:18px; font-size:13px; background:var(--bg); color:var(--text); }
#search::placeholder { color:var(--text3); }
#search:focus { outline:none; border-color:var(--primary); background:var(--surface); }

/* 채널 카드 그리드 */
.ch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:16px; }
.ch-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
           padding:18px; transition:all .18s; position:relative; }
.ch-card:hover { border-color:var(--primary-bd); transform:translateY(-2px); box-shadow:0 8px 24px rgba(168,85,247,.12); }
.ch-card.rank-1 { border-color:rgba(255,193,7,.55); background:linear-gradient(180deg, rgba(255,193,7,.06) 0%, var(--surface) 60%); }
.ch-card.rank-2 { border-color:rgba(196,196,196,.45); background:linear-gradient(180deg, rgba(196,196,196,.05) 0%, var(--surface) 60%); }
.ch-card.rank-3 { border-color:rgba(205,127,50,.45); background:linear-gradient(180deg, rgba(205,127,50,.05) 0%, var(--surface) 60%); }
.ch-rank-badge { position:absolute; top:-9px; left:16px; padding:2px 9px; border-radius:10px;
                 background:var(--surface2); border:1px solid var(--border); font-size:11px; font-weight:700; color:var(--text2); font-variant-numeric:tabular-nums; }
.ch-rank-badge.rank-1 { background:linear-gradient(135deg,#ffd700,#ffb300); color:#000; border-color:#ffd700; }
.ch-rank-badge.rank-2 { background:linear-gradient(135deg,#e0e0e0,#a8a8a8); color:#000; border-color:#c0c0c0; }
.ch-rank-badge.rank-3 { background:linear-gradient(135deg,#cd7f32,#8b4513); color:#fff; border-color:#cd7f32; }
.ch-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:10px; }
.ch-name { font-size:16px; font-weight:700; line-height:1.3; flex:1; min-width:0; color:var(--text); }
.ch-name .delta { font-size:11px; margin-left:6px; vertical-align:middle; font-weight:700; }
.ch-name .delta.up { color:var(--up); }
.ch-name .delta.down { color:var(--down); }
.ch-name .delta.flat { color:var(--text3); }
.ch-meta { font-size:12px; color:var(--text2); margin-top:3px; font-weight:500; }
.ch-type { font-size:10px; padding:2px 8px; border-radius:8px; background:var(--bg); color:var(--text2); white-space:nowrap; font-weight:700; border:1px solid var(--border); text-transform:uppercase; letter-spacing:.3px; }
.ch-cats { display:flex; flex-wrap:wrap; gap:5px; margin:8px 0; }
.ch-cat { font-size:11px; padding:2px 9px; border-radius:9px; background:var(--primary-bg); color:var(--primary-hi); font-weight:600; border:1px solid var(--primary-bd); }
.ch-stats { display:flex; gap:14px; margin:12px 0; padding:10px 0; border-top:1px solid var(--divider); border-bottom:1px solid var(--divider); }
.ch-stat { font-size:11px; color:var(--text2); flex:1; min-width:0; font-weight:500; }
.ch-stat b { font-size:18px; color:var(--text); font-weight:800; display:block; font-variant-numeric:tabular-nums; line-height:1.1; margin-bottom:2px; letter-spacing:-0.3px; }
.ch-stat.sig b { color:var(--danger); }
.ch-stat.hot b { color:var(--hot); }
.ch-vid { margin-top:10px; font-size:12px; }
.ch-vid .vlabel { font-size:10px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.ch-vid .vlabel.popular { color:var(--warn); }
.ch-vid .vlabel.latest { color:var(--hot); }
.ch-vid .vtitle { font-size:13px; font-weight:500; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-top:4px; color:var(--text); line-height:1.4; }
.ch-vid .vmeta { font-size:11px; color:var(--text3); margin-top:3px; }
.ch-vid-dual { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; padding-top:12px; border-top:1px solid var(--divider); }
.ch-vid-col { min-width:0; }
.ch-thumb-mini { width:100%; aspect-ratio:16/9; background:var(--bg); border-radius:6px; overflow:hidden; margin-bottom:6px; border:1px solid var(--border); position:relative; }
.ch-thumb-mini img { width:100%; height:100%; object-fit:cover; display:block; }
.ch-thumb-mini .views-badge { position:absolute; bottom:4px; right:4px; font-size:10px; padding:1px 5px; border-radius:4px; background:rgba(0,0,0,.78); color:#fff; font-weight:700; font-variant-numeric:tabular-nums; }
/* 스파크라인 (7일 추세) */
.ch-spark { margin-top:6px; padding-top:6px; border-top:1px dashed var(--divider); display:flex; align-items:center; justify-content:space-between; gap:8px; font-size:11px; color:var(--text2); }
.ch-spark canvas { flex:1; height:24px !important; max-width:140px; }
.ch-spark .spark-val { font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
.ch-freq { font-size:11px; color:var(--text2); display:inline-flex; align-items:center; gap:4px; padding:2px 7px; border-radius:8px; background:var(--bg); border:1px solid var(--border); white-space:nowrap; font-weight:600; }
.empty { text-align:center; color:var(--text2); padding:40px; grid-column:1/-1; }

section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:18px; }
section h2 { font-size:18px; font-weight:700; margin-bottom:14px; letter-spacing:-0.3px; }
.archive-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
.archive-grid a { display:block; background:var(--surface); border:1px solid var(--border); padding:11px;
                  border-radius:8px; text-align:center; font-size:13px; color:var(--text); font-weight:600; transition:all .15s; }
.archive-grid a:hover { background:var(--hover); border-color:var(--primary); color:var(--primary-hi); }
.archive-grid a.today { background:var(--primary); border-color:var(--primary); color:#fff; }
.nav-links { margin:14px 0; display:flex; gap:7px; flex-wrap:wrap; }
.nav-links a { background:var(--surface); padding:8px 15px; border-radius:18px; font-size:13px; font-weight:600; color:var(--text2); border:1px solid var(--border); transition:all .15s; }
.nav-links a:hover { border-color:var(--primary-bd); color:var(--text); }
.country-switch { display:inline-flex; align-items:center; gap:7px; padding:7px 14px; border:1px solid var(--border);
  border-radius:18px; font-size:13px; font-weight:700; color:var(--text); background:var(--surface); transition:all .15s; }
.country-switch:hover { background:var(--hover); border-color:var(--primary); color:var(--primary-hi); }
.shell-head { position:sticky; top:0; z-index:50; background:var(--bg); padding-top:6px; border-bottom:1px solid var(--divider); backdrop-filter:blur(8px); }
.nav-links a.tab-on { background:var(--primary); color:#fff; border-color:var(--primary); }
#view { min-height:60vh; }
.view-loading { padding:60px 20px; text-align:center; color:var(--text2); font-size:14px; }
.info-bar { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px 16px; margin:8px 0 18px; font-size:12px; color:var(--text2); line-height:1.8; }
.info-bar .desc { display:block; margin-bottom:6px; color:var(--text); font-weight:600; font-size:13px; }
.info-bar b { color:var(--text); font-weight:700; }
.legend-item { display:inline-block; margin-right:14px; white-space:nowrap; font-size:12px; }
.nav-links a.nav-primary { background:rgba(168,85,247,.10); color:var(--primary-hi); border:2px solid var(--primary); font-weight:700; padding:7px 14px; }
.nav-links a.nav-primary:hover { background:rgba(168,85,247,.18); color:var(--primary-hi); border-color:var(--primary-hi); }
.nav-links a.nav-primary.tab-on { background:var(--primary); color:#fff; border-color:var(--primary); }
/* 새 메시지 알림 스타일 배지 */
.nav-links a { position:relative; }
.nav-badge { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; border-radius:9px; background:var(--danger); color:#fff; font-size:10px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; vertical-align:middle; }
.nav-badge.fresh { background:var(--danger); box-shadow:0 0 0 0 rgba(239,68,68,.7); animation:nav-pulse 2s infinite; }
@keyframes nav-pulse {
  0% { box-shadow:0 0 0 0 rgba(239,68,68,.7); }
  70% { box-shadow:0 0 0 8px rgba(239,68,68,0); }
  100% { box-shadow:0 0 0 0 rgba(239,68,68,0); }
}
.nav-badge.dim { background:var(--surface2); color:var(--text2); border:1px solid var(--border); animation:none; box-shadow:none; }
.rec-cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:8px; }
.rec-group h3 { font-size:14px; font-weight:700; margin:6px 0 10px; }
.rec-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:13px; margin-bottom:9px; transition:all .15s; }
.rec-card:hover { border-color:var(--primary-bd); }
.rec-rank { color:var(--text3); font-weight:600; font-size:11px; margin-right:5px; }
.rec-topic { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--text); }
.rec-date { font-size:11px; color:var(--hot); font-weight:600; margin-bottom:3px; }
.rec-why { font-size:11px; color:var(--text2); margin-bottom:6px; }
.rec-ref { font-size:11px; display:inline-block; }
.rec-empty { color:var(--text2); padding:16px; font-size:12px; }
.hot-flag { display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:8px; background:var(--danger-bg); color:var(--danger); white-space:nowrap; border:1px solid var(--danger-bd); }
.reedit-box { background:var(--danger-bg); border:1px solid var(--danger-bd); border-radius:12px; padding:13px 16px; margin:10px 0 18px; }
.reedit-head { font-size:15px; font-weight:700; color:var(--text); }
.reedit-sub { display:block; font-size:11px; font-weight:500; color:var(--text2); margin-top:3px; }
.reedit-card { padding:9px 0; border-top:1px solid rgba(239,68,68,.18); }
.reedit-card:first-of-type { border-top:none; }
.reedit-line1 { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.reedit-line1 .row-title { max-width:420px; font-weight:600; }
.reedit-meta { font-size:11px; color:var(--text2); margin-top:3px; padding-left:24px; }
@media (max-width:600px){ .rec-cols{ grid-template-columns:1fr; } .reedit-line1 .row-title{ max-width:200px; } header { flex-direction:column; align-items:flex-start; } header .header-chips { margin-left:0; } }
footer { text-align:center; color:var(--text3); font-size:11px; padding:24px 0 8px; }

.tbl-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:auto; margin:10px 0 16px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { text-align:left; font-weight:700; font-size:11px; color:var(--text2);
  padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--surface2); text-transform:uppercase; letter-spacing:.3px; }
tbody td { padding:11px 14px; border-bottom:1px solid var(--divider); vertical-align:middle; color:var(--text); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:var(--hover); }
td.rank, th.rank { width:34px; text-align:center; color:var(--text2); font-weight:700; font-variant-numeric:tabular-nums; }
td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
td.num.lead { color:var(--text); font-weight:700; }
.muted { color:var(--text2); }
.cat-badge { display:inline-block; font-size:10px; padding:2px 9px; border-radius:10px; font-weight:700; white-space:nowrap; background:var(--primary-bg); color:var(--primary-hi); border:1px solid var(--primary-bd); }
.kw { font-weight:700; font-size:14px; }
.cellv { display:flex; flex-direction:column; gap:1px; }
.row-title { display:inline-block; max-width:520px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; vertical-align:bottom; color:var(--text); font-weight:500; }
.row-sub { font-size:11px; color:var(--text2); }
.ch-tag { font-size:10px; padding:1px 7px; border-radius:8px; background:var(--bg); color:var(--text2); border:1px solid var(--border); font-weight:600; }
.vid-list { display:flex; flex-direction:column; gap:6px; }
.vd-row { display:flex; flex-direction:column; gap:1px; max-width:560px; }
.vd-title { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.vd-meta { font-size:11px; color:var(--text2); }
.vd-date { color:var(--hot); font-weight:600; }
.rep-sec { margin:24px 0 6px; display:flex; align-items:baseline; gap:8px; }
.rep-sec h2 { font-size:17px; font-weight:800; color:var(--text); letter-spacing:-0.3px; }
.rep-sec .cnt { font-size:12px; color:var(--text2); font-weight:500; }
.rep-note { font-size:12px; color:var(--text2); margin:0 0 6px; }
section table { margin:10px 0; }

.news-list { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.news-row { display:flex; gap:12px; align-items:baseline; padding:13px 16px; border-bottom:1px solid var(--divider); }
.news-row:last-child { border-bottom:none; }
.news-row:hover { background:var(--hover); }
.news-rank { width:22px; flex-shrink:0; color:var(--text2); font-size:13px; font-weight:700; text-align:right; font-variant-numeric:tabular-nums; }

/* 인포그래픽 게이지 */
.gauge { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin:14px 0; }

/* 메트릭 인포그래픽 카드 */
.metric-card { display:flex; gap:14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin:10px 0; }

/* 시간 룰러 (첫 사건 시점) */
.ruler { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin:14px 0; position:relative; }
.ruler-track { height:50px; background:linear-gradient(90deg, var(--hot) 0%, var(--hot) 33%, var(--warn) 33%, var(--warn) 66%, var(--danger) 66%); border-radius:8px; position:relative; }
.ruler-marker { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--text); box-shadow:0 0 0 2px var(--surface); }
.ruler-marker::after { content:attr(data-label); position:absolute; top:-22px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--bg); font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap; }

details.auto-guide { background:linear-gradient(135deg, var(--primary-bg), rgba(132,204,22,.04)); border:2px solid var(--primary-bd); border-radius:14px; padding:0; margin:18px 0; overflow:hidden; }
details.auto-guide > summary { cursor:pointer; list-style:none; padding:18px 22px; font-size:16px; font-weight:800; color:var(--primary-hi); display:flex; align-items:center; gap:10px; user-select:none; transition:background .15s; }

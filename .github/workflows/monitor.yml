name: Monitor Lite (15min)

on:
  schedule:
    # 매 15분 (UTC 기준)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 수동 트리거 허용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r monitor_scripts/requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Run monitor_lite
        env:
          YT_TOKEN_KNOWLEDGE_ARCHIVE: ${{ secrets.YT_TOKEN_KNOWLEDGE_ARCHIVE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_scripts/monitor_lite.py

      - name: Upload state as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-state-latest
          path: state/
          retention-days: 7
          overwrite: true

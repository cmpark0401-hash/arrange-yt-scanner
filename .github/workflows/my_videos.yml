name: My Videos Monitor (1h)

on:
  schedule:
    # 매 1시간 (UTC)
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r monitor_scripts/requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: monitor-state-${{ github.run_id }}-myvideos
          restore-keys: |
            monitor-state-

      - name: Monitor my videos
        env:
          YT_TOKEN_KNOWLEDGE_ARCHIVE: ${{ secrets.YT_TOKEN_KNOWLEDGE_ARCHIVE }}
          YT_TOKEN_ECONOMY_247: ${{ secrets.YT_TOKEN_ECONOMY_247 }}
          YT_TOKEN_REDMAN_POLITICS: ${{ secrets.YT_TOKEN_REDMAN_POLITICS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_scripts/monitor_my_videos.py

      - name: Save state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-video-alerts
          path: state/my_video_alerts.json
          retention-days: 7
          overwrite: true

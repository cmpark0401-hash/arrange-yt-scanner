name: 🔥 영상 부검 (Autopsy)
description: YouTube URL을 던지면 자막을 분해하고 N편 공통 패턴을 분석합니다.
title: "[autopsy] "
labels: ["autopsy"]
body:
  - type: textarea
    id: urls
    attributes:
      label: URLs
      description: YouTube URL을 한 줄씩 (1~10개)
      placeholder: |
        https://youtube.com/watch?v=...
        https://youtube.com/watch?v=...
        https://youtube.com/watch?v=...
      render: text
    validations:
      required: true
  - type: input
    id: label
    attributes:
      label: 라벨
      description: 이 분석의 이름 (선택)
      placeholder: 잘듣네 신작 비교
  - type: input
    id: tags
    attributes:
      label: 태그
      description: 콤마 구분 (선택)
      placeholder: 위로,수면

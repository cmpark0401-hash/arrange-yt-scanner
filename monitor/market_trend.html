<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📊 시장 트렌드 · 골든타임</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--card);
    padding: 14px 16px;
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  .kpi.ss { border-left-color: #fbbf24; }
  .kpi.s { border-left-color: #fdba74; }
  .kpi.a { border-left-color: #93c5fd; }
  .kpi.boom { border-left-color: var(--hot); }
  .kpi .val { font-size: 24px; font-weight: 800; color: var(--text); }
  .kpi .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  .kpi .delta { font-size: 12px; margin-top: 3px; }
  .delta-up { color: #22c55e; }
  .delta-down { color: #ef4444; }
  .delta-flat { color: var(--muted); }

  .chart-card {
    background: var(--card);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .chart-card h3 { margin: 0 0 12px; font-size: 14px; color: var(--muted); }
  .chart {
    width: 100%;
    height: 220px;
    background: var(--bg);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .chart-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
  }
  svg.chart-svg { width: 100%; height: 100%; display: block; }
  .table-simple {
    width: 100%;
    font-size: 12px;
    border-collapse: collapse;
  }
  .table-simple th, .table-simple td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .table-simple th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 10px; }
</style>
</head>
<body>
<div id="nav"></div>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h1>📊 시장 트렌드</h1>
    <div class="muted" id="updated-at"></div>
  </div>
  <p class="muted" style="margin-bottom: 16px;">
    감시 채널 54개의 조회수 크기 · 매일 자동 스냅샷 · 최근 60일 히스토리
  </p>

  <div class="kpi-grid" id="kpis"></div>

  <div class="chart-card">
    <h3>SS/S/A 티어 상위5 평균 뷰 · 최근 60일</h3>
    <div class="chart" id="chart-tier"></div>
  </div>

  <div class="chart-card">
    <h3>10K+ 폭발 채널 수 · 최근 60일</h3>
    <div class="chart" id="chart-boom"></div>
  </div>

  <div class="chart-card">
    <h3>스냅샷 기록 (최근 14일)</h3>
    <table class="table-simple" id="snap-table"></table>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/data/market_trend.js"></script>
<script>
const data = window.__MARKET_TREND__ || { snapshots: [] };
const snaps = data.snapshots || [];

document.getElementById('updated-at').textContent = '갱신: ' + (data.updated_at || '-');

if (snaps.length === 0) {
  document.getElementById('kpis').innerHTML = '<div class="chart-empty" style="grid-column:1/5;padding:40px">데이터 없음 · 내일부터 축적</div>';
} else {
  const cur = snaps[snaps.length - 1];
  const prev = snaps.length >= 2 ? snaps[snaps.length - 2] : null;

  function fmt(n) { return (n || 0).toLocaleString(); }
  function deltaEl(cur, prev, key) {
    if (!prev) return '<span class="delta">기준 데이터</span>';
    const v = (cur[key] || 0) - (prev[key] || 0);
    if (v === 0) return '<span class="delta delta-flat">→ 변화 없음</span>';
    const cls = v > 0 ? 'delta-up' : 'delta-down';
    const sign = v > 0 ? '↑ +' : '↓ ';
    return `<span class="delta ${cls}">${sign}${Math.abs(v).toLocaleString()}</span>`;
  }

  const kpis = [
    { k: 'ss_top5_avg', l: 'SS 상위5 평균', v: cur.ss_top5_avg, cls: 'ss' },
    { k: 's_top5_avg', l: 'S 상위5 평균', v: cur.s_top5_avg, cls: 's' },
    { k: 'a_top5_avg', l: 'A 상위5 평균', v: cur.a_top5_avg, cls: 'a' },
    { k: 'count_10k_7d', l: '10K+ 폭발 채널', v: cur.count_10k_7d, cls: 'boom' },
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k => `
    <div class="kpi ${k.cls}">
      <div class="val">${fmt(k.v)}</div>
      <div class="lbl">${k.l}</div>
      ${deltaEl(cur, prev, k.k)}
    </div>
  `).join('');

  // SVG 라인 차트
  function drawChart(svgId, keys, labels, colors) {
    if (snaps.length < 1) {
      document.getElementById(svgId).innerHTML = '<div class="chart-empty">아직 데이터 1개 · 내일부터 곡선</div>';
      return;
    }
    const W = 900, H = 220, PAD = 40;
    const xs = snaps.map((s, i) => PAD + (W - PAD * 2) * i / Math.max(1, snaps.length - 1));
    let maxY = 0;
    keys.forEach(k => snaps.forEach(s => { maxY = Math.max(maxY, s[k] || 0); }));
    maxY = maxY * 1.2 || 1;
    function y(v) { return H - PAD - (H - PAD * 2) * (v / maxY); }

    let svg = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
    // 격자
    for (let i = 0; i <= 4; i++) {
      const yy = PAD + (H - PAD * 2) * i / 4;
      const v = Math.round(maxY * (1 - i / 4));
      svg += `<line x1="${PAD}" y1="${yy}" x2="${W - PAD}" y2="${yy}" stroke="#2c3140" stroke-width="0.5"/>`;
      svg += `<text x="6" y="${yy + 4}" font-size="10" fill="#8a92a3">${fmt(v)}</text>`;
    }
    // 데이터
    keys.forEach((k, ki) => {
      const pts = snaps.map((s, i) => `${xs[i]},${y(s[k] || 0)}`).join(' ');
      svg += `<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="2"/>`;
      snaps.forEach((s, i) => {
        svg += `<circle cx="${xs[i]}" cy="${y(s[k] || 0)}" r="3" fill="${colors[ki]}"/>`;
      });
    });
    // x축 라벨 (첫·중간·끝)
    const showIdx = [0, Math.floor(snaps.length / 2), snaps.length - 1];
    showIdx.forEach(i => {
      if (i >= 0 && i < snaps.length) {
        svg += `<text x="${xs[i]}" y="${H - 8}" font-size="10" fill="#8a92a3" text-anchor="middle">${snaps[i].date.slice(5)}</text>`;
      }
    });
    // 범례
    keys.forEach((k, ki) => {
      const xLegend = W - PAD - 100 + (ki % 3) * 90;
      const yLegend = 20;
      svg += `<circle cx="${xLegend}" cy="${yLegend}" r="3" fill="${colors[ki]}"/>`;
      svg += `<text x="${xLegend + 8}" y="${yLegend + 4}" font-size="11" fill="${colors[ki]}">${labels[ki]}</text>`;
    });
    svg += '</svg>';
    document.getElementById(svgId).innerHTML = svg;
  }

  drawChart('chart-tier',
    ['ss_top5_avg', 's_top5_avg', 'a_top5_avg'],
    ['SS', 'S', 'A'],
    ['#fbbf24', '#fdba74', '#93c5fd']);

  drawChart('chart-boom',
    ['count_10k_7d', 'count_100k_7d'],
    ['10K+', '100K+'],
    ['#dc2626', '#7f1d1d']);

  // 최근 14일 테이블
  const recent = snaps.slice(-14).reverse();
  const rows = recent.map(s => `
    <tr>
      <td>${s.date}</td>
      <td>${fmt(s.ss_top5_avg)}</td>
      <td>${fmt(s.s_top5_avg)}</td>
      <td>${fmt(s.a_top5_avg)}</td>
      <td>${s.count_10k_7d}</td>
      <td>${s.total_uploads_7d}</td>
    </tr>
  `).join('');
  document.getElementById('snap-table').innerHTML = `
    <thead><tr>
      <th>날짜</th><th>SS 상위5</th><th>S 상위5</th><th>A 상위5</th>
      <th>10K+ 폭발</th><th>7일 발행</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  `;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📋 채널 리스트 · 골든타임</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .stat-hero {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    padding: 14px 18px;
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  .stat-card.watching { border-left-color: var(--tier-ss-bg); }
  .stat-card.candidate { border-left-color: var(--muted); }
  .stat-card .v { font-size: 22px; font-weight: 800; color: var(--text); }
  .stat-card .l { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }

  .pool-table-header, .pool-row {
    display: grid;
    grid-template-columns: 40px 60px 60px 1.5fr 100px 1fr 100px;
    gap: 12px;
    padding: 10px 14px;
    align-items: center;
  }
  .pool-table-header {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .pool-row {
    background: var(--card);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    transition: all 0.15s;
  }
  .pool-row:hover { background: var(--card-hover); }
  .pool-row.watching { border-left: 3px solid var(--tier-ss-bg); }
  .pool-row.candidate { opacity: 0.75; }
  .pool-row .idx { color: var(--muted); font-size: 11px; text-align: right; }
  .pool-row .name { font-weight: 700; color: var(--text); }
  .pool-row .name a { color: #60a5fa; text-decoration: none; font-size: 11px; }

  .badge-sm {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
  }
  .badge-watching { background: var(--tier-ss-bg); color: var(--tier-ss-text); }
  .badge-candidate { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .badge-type-일반 { background: #1e3a8a; color: #93c5fd; }
  .badge-type-AI { background: #7c2d12; color: #fdba74; }
  .badge-type-대형 { background: #166534; color: #86efac; }
  .badge-type-일반뉴스 { background: #78350f; color: #fbbf24; }

  .filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
</style>
</head>
<body>
<div id="nav"></div>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h1>📋 채널 리스트 (전체 등록)</h1>
    <div class="muted" id="stats-updated"></div>
  </div>

  <p class="muted" style="margin-bottom: 16px;">
    초기 등록한 168 채널 · 그중 <strong style="color:#fbbf24">54개는 현재 감시 중</strong> (SS/S/A 티어) · 나머지는 후보 상태
  </p>

  <div class="stat-hero" id="stat-hero"></div>

  <div class="filter-row">
    <div class="filter-group">
      <span class="label">상태</span>
      <button data-status="all" class="active">전체</button>
      <button data-status="watching">감시 중</button>
      <button data-status="candidate">후보</button>
    </div>

    <div class="filter-group">
      <span class="label">타입</span>
      <button data-type="all" class="active">전체</button>
      <button data-type="대형">대형</button>
      <button data-type="일반">일반</button>
      <button data-type="AI">AI</button>
      <button data-type="일반, 뉴스">일반+뉴스</button>
    </div>

    <input id="q" placeholder="🔍 채널명 검색..." oninput="render()">
  </div>

  <div class="pool-table-header">
    <div style="text-align:right">#</div>
    <div>상태</div>
    <div>티어</div>
    <div>채널명</div>
    <div>타입</div>
    <div>구독·평균뷰</div>
    <div>액션</div>
  </div>

  <div id="rows"></div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/data/channel_pool.js"></script>
<script>
const data = window.__CHANNEL_POOL__ || { entries: [], stats: {} };
let statusFilter = 'all';
let typeFilter = 'all';

document.getElementById('stats-updated').textContent = '갱신: ' + (data.updated_at || '-');

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmt(n) { return (n || 0).toLocaleString(); }

function renderStats() {
  const s = data.stats;
  const cards = [
    { v: s.total, l: '전체 등록', cls: '' },
    { v: s.watching, l: '감시 중 (SS/S/A)', cls: 'watching' },
    { v: s.candidate, l: '후보 (미감시)', cls: 'candidate' },
    { v: `SS ${s.by_tier?.SS || 0} · S ${s.by_tier?.S || 0} · A ${s.by_tier?.A || 0}`, l: '티어 분포', cls: '' },
  ];
  document.getElementById('stat-hero').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="v">${c.v}</div>
      <div class="l">${c.l}</div>
    </div>
  `).join('');
}

function filtered() {
  const q = document.getElementById('q').value.toLowerCase();
  let list = [...(data.entries || [])];

  // 정렬: 감시 중 우선 → 티어 → 이름
  const tierRank = { 'SS': 0, 'S': 1, 'A': 2, '': 9 };
  list.sort((a, b) => {
    if (a.is_watching !== b.is_watching) return a.is_watching ? -1 : 1;
    const ra = tierRank[a.tier] ?? 9;
    const rb = tierRank[b.tier] ?? 9;
    if (ra !== rb) return ra - rb;
    return (a.name || '').localeCompare(b.name || '');
  });

  if (statusFilter === 'watching') list = list.filter(e => e.is_watching);
  else if (statusFilter === 'candidate') list = list.filter(e => !e.is_watching);
  if (typeFilter !== 'all') list = list.filter(e => e.type === typeFilter);
  if (q) list = list.filter(e => (e.name || '').toLowerCase().includes(q));
  return list;
}

function render() {
  const items = filtered();
  document.getElementById('rows').innerHTML = items.map((e, i) => {
    const statusBadge = e.is_watching
      ? '<span class="badge-sm badge-watching">감시 중</span>'
      : '<span class="badge-sm badge-candidate">후보</span>';
    const tierBadge = e.is_watching && e.tier
      ? `<span class="tier-tag ${e.tier}">${e.tier}</span>`
      : '<span style="color:var(--muted);font-size:11px">-</span>';
    const typeBadge = e.type
      ? `<span class="badge-sm badge-type-${e.type.replace(', ','')}">${e.type}</span>`
      : '';
    const metric = e.is_watching
      ? `<span style="font-size:11px"><span class="muted">구독</span> ${fmt(e.subs)} · <span class="muted">평균</span> ${fmt(e.avg_views)}</span>`
      : '<span style="color:var(--muted);font-size:11px">미조사</span>';
    return `
      <div class="pool-row ${e.is_watching ? 'watching' : 'candidate'}">
        <div class="idx">${i + 1}</div>
        <div>${statusBadge}</div>
        <div>${tierBadge}</div>
        <div class="name">${esc(e.name)}<br><a href="${e.url}" target="_blank">채널 ↗</a></div>
        <div>${typeBadge}</div>
        <div>${metric}</div>
        <div>
          ${e.is_watching
            ? `<span style="color:var(--muted);font-size:11px">${e.poll_interval_min}분마다 폴링</span>`
            : '<span style="color:var(--muted);font-size:11px">감시 없음</span>'}
        </div>
      </div>
    `;
  }).join('');
}

document.querySelectorAll('.filter-group button[data-status]').forEach(b => {
  b.onclick = () => {
    statusFilter = b.dataset.status;
    document.querySelectorAll('.filter-group button[data-status]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
});
document.querySelectorAll('.filter-group button[data-type]').forEach(b => {
  b.onclick = () => {
    typeFilter = b.dataset.type;
    document.querySelectorAll('.filter-group button[data-type]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
});

renderStats();
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎬 나의 채널 · 튜브해커</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--hot);
  }
  .tab .tab-count {
    background: var(--card-hover);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .tab.active .tab-count { background: var(--tier-s); color: var(--tier-s-text); }

  .channel-hero {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .video-list-header {
    display: grid;
    grid-template-columns: 40px 130px 1fr 120px 120px 120px 100px;
    gap: 12px;
    padding: 8px 14px;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .video-list-header .num-col { text-align: right; }

  .video-item {
    display: grid;
    grid-template-columns: 40px 130px 1fr 120px 120px 120px 100px;
    gap: 12px;
    align-items: center;
    background: var(--card);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 6px;
    transition: all 0.15s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .video-item:hover {
    background: var(--card-hover);
    transform: translateX(2px);
  }
  .v-idx { color: var(--muted); font-size: 11px; text-align: right; font-variant-numeric: tabular-nums; }
  .v-thumb-large {
    width: 130px;
    height: 73px;
    border-radius: 6px;
    background-size: cover;
    background-position: center;
    background-color: #0f1116;
    position: relative;
  }
  .v-duration {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.85);
    color: white;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 3px;
    font-weight: 600;
  }
  .v-title-large {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .v-date-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
  .stat-col { text-align: right; font-variant-numeric: tabular-nums; }
  .stat-val { font-size: 14px; font-weight: 700; color: var(--hot); }
  .stat-val.small { color: var(--text); font-size: 13px; }
  .stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .link-col a {
    display: inline-block;
    padding: 5px 10px;
    background: var(--danger);
    color: white;
    border-radius: 4px;
    text-decoration: none;
    font-size: 10px;
    font-weight: 600;
  }

  .sort-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
</style>
</head>
<body>
<div id="nav"></div>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <h1>🎬 나의 채널</h1>
    <div class="muted" id="updated-at"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="channel-content"></div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/data/my_channels.js"></script>
<script>
const data = window.__MY_CHANNELS__ || { channels: [] };
let currentTab = 0;
let sortBy = 'date'; // 'date' | 'views' | 'engagement'

document.getElementById('updated-at').textContent = '갱신: ' + (data.updated_at || '-');

// Tabs
function renderTabs() {
  document.getElementById('tabs').innerHTML = data.channels.map((ch, i) => `
    <button class="tab ${i === currentTab ? 'active' : ''}" onclick="setTab(${i})">
      ${ch.emoji} ${ch.name}
      <span class="tab-count">${(ch.videos || []).length}</span>
    </button>
  `).join('');
}

function setTab(i) {
  currentTab = i;
  sortBy = 'date';
  renderTabs();
  renderChannel();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmt(n) { return (n || 0).toLocaleString(); }
function fmtDur(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function sortVideos(videos) {
  const arr = [...videos];
  if (sortBy === 'views') return arr.sort((a, b) => b.views - a.views);
  if (sortBy === 'engagement') return arr.sort((a, b) => b.comment_ratio_pct - a.comment_ratio_pct);
  return arr.sort((a, b) => a.days_ago - b.days_ago);
}

function renderChannel() {
  const ch = data.channels[currentTab];
  if (!ch) return;

  if (ch.error) {
    document.getElementById('channel-content').innerHTML = `
      <div class="card" style="text-align:center; padding:40px; color:var(--muted);">
        ⚠️ ${ch.error} · OAuth 토큰 필요<br>
        <code style="font-size:11px;">.venv/bin/python scripts/mece/youtube_oauth_setup.py --channel ${ch.slug}</code>
      </div>
    `;
    return;
  }

  const videos = ch.videos || [];
  const a = ch.analytics || {};
  const sortedVideos = sortVideos(videos);

  // 성과 통계 (30일)
  const v30 = videos.filter(v => v.days_ago <= 30);
  const totalViews30 = v30.reduce((s, v) => s + v.views, 0);
  const avgViews30 = v30.length ? Math.round(totalViews30 / v30.length) : 0;
  const totalComments30 = v30.reduce((s, v) => s + v.comments, 0);
  const engagePct = totalViews30 ? (totalComments30 / totalViews30 * 100).toFixed(2) : '0';

  document.getElementById('channel-content').innerHTML = `
    <div class="channel-hero">
      <div class="stat-tile">
        <div class="val">${fmt(ch.subs)}</div>
        <div class="lbl">구독자</div>
      </div>
      <div class="stat-tile">
        <div class="val">${fmt(ch.video_count)}</div>
        <div class="lbl">전체 영상</div>
      </div>
      <div class="stat-tile">
        <div class="val">${fmt(avgViews30)}</div>
        <div class="lbl">30일 평균 뷰 (${v30.length}편)</div>
      </div>
      <div class="stat-tile">
        <div class="val">${engagePct}%</div>
        <div class="lbl">30일 댓글 참여율</div>
      </div>
    </div>

    ${a.available ? `
    <div class="card" style="margin-bottom: 20px;">
      <h3 style="margin-top:0">📊 채널 Analytics (최근 30일)</h3>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; font-size: 13px;">
        <div><span class="muted">노출 CTR</span> · <b style="color:var(--hot)">${(a.channel_ctr || 0).toFixed(2)}%</b></div>
        <div><span class="muted">평균 시청지속률</span> · <b style="color:var(--hot)">${(a.channel_avg_retention_pct || 0).toFixed(1)}%</b></div>
        <div><span class="muted">평균 시청시간</span> · <b>${Math.round(a.channel_avg_duration_sec || 0)}초</b></div>
        <div><span class="muted">30일 뷰</span> · <b>${fmt(a.channel_views_30d || 0)}</b></div>
      </div>
    </div>` : ''}

    <div class="sort-controls">
      <span class="muted" style="font-size: 12px;">정렬:</span>
      <button class="${sortBy === 'date' ? 'active' : ''}" onclick="setSort('date')">발행일 순</button>
      <button class="${sortBy === 'views' ? 'active' : ''}" onclick="setSort('views')">조회수 순</button>
      <button class="${sortBy === 'engagement' ? 'active' : ''}" onclick="setSort('engagement')">댓글 참여율 순</button>
    </div>

    <div class="video-list-header">
      <div class="num-col">#</div>
      <div>썸네일</div>
      <div>제목 · 발행일</div>
      <div class="stat-col">조회수</div>
      <div class="stat-col">좋아요</div>
      <div class="stat-col">댓글 (%)</div>
      <div class="stat-col">링크</div>
    </div>

    ${sortedVideos.map((v, i) => `
      <a href="${v.url}" target="_blank" class="video-item">
        <div class="v-idx">${i + 1}</div>
        <div class="v-thumb-large" style="background-image: url('https://i.ytimg.com/vi/${v.vid}/mqdefault.jpg')">
          <span class="v-duration">${fmtDur(v.duration_sec)}</span>
        </div>
        <div>
          <div class="v-title-large">${esc(v.title)}</div>
          <div class="v-date-sub">${v.date_str} · D+${v.days_ago}</div>
        </div>
        <div class="stat-col">
          <div class="stat-val">${fmt(v.views)}</div>
          <div class="stat-lbl">뷰</div>
        </div>
        <div class="stat-col">
          <div class="stat-val small">${fmt(v.likes)}</div>
          <div class="stat-lbl">👍</div>
        </div>
        <div class="stat-col">
          <div class="stat-val small">${fmt(v.comments)}</div>
          <div class="stat-lbl">${v.comment_ratio_pct}%</div>
        </div>
        <div class="stat-col link-col">
          <span style="background: var(--danger); color: white; padding: 5px 10px; border-radius: 4px; font-size: 10px;">열기 ↗</span>
        </div>
      </a>
    `).join('')}

    ${videos.length === 0 ? '<div class="card" style="text-align:center; padding:40px; color:var(--muted);">영상 없음</div>' : ''}
  `;
}

function setSort(s) {
  sortBy = s;
  renderChannel();
}

renderTabs();
renderChannel();
</script>
</body>
</html>
